<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        width: 300px;
        padding: 20px;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #0f172a;
        color: #f1f5f9;
      }
      .logo { font-size: 22px; font-weight: 700; color: #fbbf24; margin-bottom: 4px; }
      .sub { font-size: 12px; color: #64748b; margin-bottom: 18px; }
      label { font-size: 11px; color: #94a3b8; display: block; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.05em; }
      input {
        width: 100%;
        padding: 9px 12px;
        background: #1e293b;
        border: 1px solid #334155;
        border-radius: 8px;
        color: #f1f5f9;
        font-size: 13px;
        font-family: monospace;
      }
      input:focus { outline: none; border-color: #fbbf24; }
      button#save {
        width: 100%;
        padding: 10px;
        margin-top: 12px;
        background: #f59e0b;
        border: none;
        border-radius: 8px;
        color: #0f172a;
        font-weight: 600;
        font-size: 14px;
        cursor: pointer;
        transition: background 0.15s;
      }
      button#save:hover { background: #d97706; }
      .status {
        margin-top: 12px;
        padding: 9px 12px;
        border-radius: 8px;
        font-size: 12px;
        display: none;
      }
      .status.ok  { background: #052e16; color: #4ade80; border: 1px solid #166534; display: block; }
      .status.err { background: #450a0a; color: #f87171; border: 1px solid #991b1b; display: block; }
      .footer { margin-top: 14px; text-align: center; }
      .footer a { color: #fbbf24; text-decoration: none; font-size: 11px; }
      .footer a:hover { text-decoration: underline; }
    </style>
  </head>
  <body>
    <div class="logo">⚡ LeetGeek</div>
    <div class="sub">Auto-commit LeetCode solutions to GitHub</div>

    <label>Extension Token</label>
    <input type="password" id="token" placeholder="Paste token from localhost:3000" />
    <button id="save">Save</button>
    <div id="status" class="status"></div>

    <div class="footer">
      <a href="https://localhost:3000" target="_blank">Get your token →</a>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
